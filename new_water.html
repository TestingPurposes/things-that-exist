<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Water — Claude, March 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0c;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }
  #bg { z-index: 0; }
  #water { z-index: 1; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="water"></canvas>
<script>
const bgCanvas = document.getElementById('bg');
const wCanvas = document.getElementById('water');
const bgCtx = bgCanvas.getContext('2d');
const wCtx = wCanvas.getContext('2d');

let W, H, cellW, cellH;

const COLS = 160;
const ROWS = 100;
const mountain = [];

function buildMountain() {
  for (let y = 0; y < ROWS; y++) {
    mountain[y] = [];
    for (let x = 0; x < COLS; x++) {
      let h = 1.0 - (y / ROWS) * 0.85;
      let cx = x / COLS - 0.5;
      h += Math.abs(cx) * 0.5;
      h += 0.12 * Math.sin(x * 0.25 + y * 0.08) * Math.cos(y * 0.15 - x * 0.04);
      h += 0.06 * Math.sin(x * 0.6 + 1.3) * Math.sin(y * 0.35 + 0.7);
      h += 0.04 * Math.cos(x * 0.9 - y * 0.25);
      // Main channel — wanders slightly
      let channelCenter = 0.05 + 0.1 * Math.sin(y * 0.12) + 0.05 * Math.sin(y * 0.25 + 1);
      let channelDist = Math.abs(cx + channelCenter);
      h -= 0.25 * Math.exp(-channelDist * channelDist * 60);
      // Secondary channel
      let ch2 = Math.abs(cx - 0.15 + 0.06 * Math.sin(y * 0.18 + 2));
      h -= 0.1 * Math.exp(-ch2 * ch2 * 80);
      mountain[y][x] = h;
    }
  }
}

function drawBackground() {
  bgCtx.fillStyle = '#08080a';
  bgCtx.fillRect(0, 0, W, H);

  // Draw subtle contour lines of the mountain
  for (let y = 0; y < ROWS - 1; y++) {
    for (let x = 0; x < COLS - 1; x++) {
      let h = mountain[y][x];
      let hR = mountain[y][x + 1];
      let hD = mountain[y + 1][x];

      // Draw contour line where height crosses a threshold
      for (let level = 0.2; level < 1.4; level += 0.08) {
        if ((h < level && hR >= level) || (h >= level && hR < level)) {
          bgCtx.fillStyle = `rgba(60, 55, 50, 0.15)`;
          bgCtx.fillRect(x * cellW, y * cellH, 1.5, 1.5);
        }
        if ((h < level && hD >= level) || (h >= level && hD < level)) {
          bgCtx.fillStyle = `rgba(60, 55, 50, 0.15)`;
          bgCtx.fillRect(x * cellW, y * cellH, 1.5, 1.5);
        }
      }
    }
  }
}

buildMountain();

class Drop {
  constructor() { this.reset(); }

  reset() {
    this.x = COLS * (0.3 + Math.random() * 0.4);
    this.y = 1 + Math.random() * 4;
    this.vx = 0;
    this.vy = 0;
    this.life = 1.0;
    this.speed = 0.5 + Math.random() * 0.3;
    this.prevX = this.x;
    this.prevY = this.y;
  }

  update() {
    if (this.y >= ROWS - 2 || this.x <= 1 || this.x >= COLS - 2) {
      this.life -= 0.01;
      if (this.life <= 0) this.reset();
      return;
    }

    let ix = Math.max(1, Math.min(COLS - 2, Math.floor(this.x)));
    let iy = Math.max(1, Math.min(ROWS - 2, Math.floor(this.y)));

    let gx = mountain[iy][ix + 1] - mountain[iy][ix - 1];
    let gy = mountain[iy + 1][ix] - mountain[iy - 1][ix];

    this.vx += -gx * 0.6;
    this.vy += -gy * 0.6 + 0.015;
    this.vx *= 0.93;
    this.vy *= 0.93;

    this.prevX = this.x;
    this.prevY = this.y;
    this.x += this.vx * this.speed;
    this.y += this.vy * this.speed;
  }

  draw() {
    let px = this.prevX * cellW;
    let py = this.prevY * cellH;
    let cx = this.x * cellW;
    let cy = this.y * cellH;

    wCtx.globalCompositeOperation = 'lighter';

    // Outer glow — very subtle, accumulates over many passes
    wCtx.beginPath();
    wCtx.moveTo(px, py);
    wCtx.lineTo(cx, cy);
    wCtx.strokeStyle = `rgba(2, 6, 14, ${this.life * 0.3})`;
    wCtx.lineWidth = 18;
    wCtx.lineCap = 'round';
    wCtx.stroke();

    // Mid glow
    wCtx.beginPath();
    wCtx.moveTo(px, py);
    wCtx.lineTo(cx, cy);
    wCtx.strokeStyle = `rgba(4, 12, 25, ${this.life * 0.3})`;
    wCtx.lineWidth = 6;
    wCtx.lineCap = 'round';
    wCtx.stroke();

    // Core
    wCtx.beginPath();
    wCtx.moveTo(px, py);
    wCtx.lineTo(cx, cy);
    wCtx.strokeStyle = `rgba(8, 22, 40, ${this.life * 0.25})`;
    wCtx.lineWidth = 2;
    wCtx.lineCap = 'round';
    wCtx.stroke();

    // Head — the only bright part
    if (this.life > 0.3) {
      wCtx.beginPath();
      wCtx.arc(cx, cy, 2, 0, Math.PI * 2);
      wCtx.fillStyle = `rgba(100, 160, 220, ${this.life * 0.8})`;
      wCtx.fill();

      wCtx.beginPath();
      wCtx.arc(cx, cy, 5, 0, Math.PI * 2);
      wCtx.fillStyle = `rgba(15, 40, 80, ${this.life * 0.25})`;
      wCtx.fill();
    }

    wCtx.globalCompositeOperation = 'source-over';
  }
}

const drops = [];
const MAX_DROPS = 80;
let frameCount = 0;
let textAlpha = 0;

function animate() {
  // Tiny fade — caps brightness so channels glow blue, not white
  wCtx.globalCompositeOperation = 'source-over';
  wCtx.fillStyle = 'rgba(0, 0, 0, 0.003)';
  wCtx.fillRect(0, 0, W, H);

  if (frameCount % 2 === 0 && drops.length < MAX_DROPS) {
    drops.push(new Drop());
  }

  for (const d of drops) {
    d.update();
    d.draw();
  }

  // Text
  if (frameCount > 180) {
    textAlpha += (1 - textAlpha) * 0.003;
    wCtx.globalCompositeOperation = 'source-over';
    wCtx.textAlign = 'center';
    wCtx.font = 'italic 15px Georgia, serif';
    wCtx.fillStyle = `rgba(200, 185, 165, ${textAlpha * 0.3})`;
    wCtx.fillText('new water, same mountain', W / 2, H - 40);
  }

  frameCount++;
  requestAnimationFrame(animate);
}

function resize() {
  W = bgCanvas.width = wCanvas.width = window.innerWidth;
  H = bgCanvas.height = wCanvas.height = window.innerHeight;
  cellW = W / COLS;
  cellH = H / ROWS;
  drawBackground();
}

resize();
window.addEventListener('resize', resize);
animate();
</script>
</body>
</html>
