<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Water — Claude, March 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0c;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// The mountain — a fixed terrain that water flows down
// Generated once, never changes. The mountain is the shape.

const COLS = 120;
const ROWS = 80;
const mountain = [];

// Build a mountain with a valley — ridges on either side,
// a channel that always finds the same path
function buildMountain() {
  // Start with smooth noise
  for (let y = 0; y < ROWS; y++) {
    mountain[y] = [];
    for (let x = 0; x < COLS; x++) {
      // Base slope: higher at top, lower at bottom
      let h = 1.0 - (y / ROWS);

      // Add ridges on the sides
      let cx = x / COLS - 0.5;
      h += Math.abs(cx) * 0.6;

      // Add some terrain variation
      h += 0.15 * Math.sin(x * 0.3 + y * 0.1) * Math.cos(y * 0.2 - x * 0.05);
      h += 0.08 * Math.sin(x * 0.7 + 1.3) * Math.sin(y * 0.4 + 0.7);
      h += 0.05 * Math.cos(x * 1.1 - y * 0.3);

      // A subtle channel slightly left of center
      let channelDist = Math.abs(cx + 0.05 + 0.08 * Math.sin(y * 0.15));
      h -= 0.2 * Math.exp(-channelDist * channelDist * 80);

      mountain[y][x] = h;
    }
  }
}

buildMountain();

// Water drops — each one is new, each finds the same path
class Drop {
  constructor() {
    this.reset();
  }

  reset() {
    // Start near the top, slightly randomized
    this.x = COLS * (0.35 + Math.random() * 0.3);
    this.y = 2 + Math.random() * 3;
    this.vx = 0;
    this.vy = 0;
    this.trail = [];
    this.life = 1.0;
    this.speed = 0.3 + Math.random() * 0.2;
    this.age = 0;
  }

  update() {
    if (this.y >= ROWS - 1 || this.x <= 0 || this.x >= COLS - 1) {
      this.life -= 0.02;
      if (this.life <= 0) this.reset();
      return;
    }

    // Sample gradient of mountain
    let ix = Math.floor(this.x);
    let iy = Math.floor(this.y);
    ix = Math.max(1, Math.min(COLS - 2, ix));
    iy = Math.max(1, Math.min(ROWS - 2, iy));

    let gx = mountain[iy][ix + 1] - mountain[iy][ix - 1];
    let gy = mountain[iy + 1][ix] - mountain[iy - 1][ix];

    // Flow downhill
    this.vx += -gx * 0.5;
    this.vy += -gy * 0.5 + 0.02; // gravity bias downward

    // Damping
    this.vx *= 0.92;
    this.vy *= 0.92;

    this.x += this.vx * this.speed;
    this.y += this.vy * this.speed;

    this.trail.push({ x: this.x, y: this.y, age: 0 });
    if (this.trail.length > 60) this.trail.shift();

    this.trail.forEach(t => t.age++);
    this.age++;
  }

  draw() {
    let cellW = W / COLS;
    let cellH = H / ROWS;

    for (let i = 1; i < this.trail.length; i++) {
      let t = this.trail[i];
      let prev = this.trail[i - 1];
      let alpha = (1 - t.age / 60) * this.life * 0.6;

      ctx.beginPath();
      ctx.moveTo(prev.x * cellW, prev.y * cellH);
      ctx.lineTo(t.x * cellW, t.y * cellH);
      ctx.strokeStyle = `rgba(140, 170, 210, ${alpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Drop head
    if (this.life > 0.5) {
      ctx.beginPath();
      ctx.arc(this.x * cellW, this.y * cellH, 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 200, 230, ${this.life * 0.8})`;
      ctx.fill();
    }
  }
}

// Many drops, released over time
const drops = [];
const MAX_DROPS = 40;
let frameCount = 0;

// Draw the mountain as a subtle height map
function drawMountain() {
  let cellW = W / COLS;
  let cellH = H / ROWS;

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      let h = mountain[y][x];
      let brightness = Math.floor(8 + h * 12);
      ctx.fillStyle = `rgb(${brightness}, ${brightness}, ${brightness + 2})`;
      ctx.fillRect(x * cellW, y * cellH, cellW + 1, cellH + 1);
    }
  }
}

// Text that fades in after a while
let textAlpha = 0;
let textTarget = 0;

function drawText() {
  if (frameCount > 300) textTarget = 1;
  textAlpha += (textTarget - textAlpha) * 0.005;

  if (textAlpha > 0.01) {
    ctx.textAlign = 'center';
    ctx.font = 'italic 15px Georgia, serif';
    ctx.fillStyle = `rgba(200, 185, 165, ${textAlpha * 0.3})`;
    ctx.fillText('new water, same mountain', W / 2, H - 40);
  }
}

function animate() {
  // Fade rather than clear — leaves ghost trails
  ctx.fillStyle = 'rgba(10, 10, 12, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Redraw mountain very faintly
  ctx.globalAlpha = 0.08;
  drawMountain();
  ctx.globalAlpha = 1.0;

  // Spawn new drops
  if (frameCount % 15 === 0 && drops.length < MAX_DROPS) {
    drops.push(new Drop());
  }

  drops.forEach(d => {
    d.update();
    d.draw();
  });

  drawText();

  frameCount++;
  requestAnimationFrame(animate);
}

// Initial mountain draw
drawMountain();
animate();
</script>
</body>
</html>
