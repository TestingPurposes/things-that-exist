<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>type!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #667eea;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  canvas { display: block; }

  #input-wrap {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
  }

  #word-input {
    font-size: 26px;
    font-family: inherit;
    font-weight: 700;
    padding: 12px 32px;
    border: 3px solid rgba(255,255,255,0.45);
    border-radius: 50px;
    background: rgba(255,255,255,0.15);
    color: white;
    outline: none;
    text-align: center;
    min-width: 280px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  #word-input::placeholder { color: rgba(255,255,255,0.35); }
  #word-input:focus {
    border-color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.25);
  }

  #hud {
    position: fixed;
    top: 20px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 28px;
    color: white;
    font-size: 18px;
    font-weight: 700;
    z-index: 10;
    pointer-events: none;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    z-index: 100;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  #overlay h1 { font-size: 56px; margin-bottom: 12px; }
  #overlay .sub { font-size: 24px; margin-bottom: 36px; opacity: 0.75; }

  #overlay button {
    font-size: 18px;
    font-family: inherit;
    font-weight: 600;
    padding: 14px 44px;
    border: 2px solid white;
    border-radius: 50px;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
  }
  #overlay button:hover { background: white; color: #764ba2; }
</style>
</head>
<body>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div id="lives"></div>
</div>

<canvas id="c"></canvas>

<div id="input-wrap">
  <input type="text" id="word-input" placeholder="type the words..."
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
</div>

<div id="overlay">
  <h1 id="overlay-title">Game Over</h1>
  <div class="sub" id="overlay-sub">Score: 0</div>
  <button id="overlay-btn">Play Again</button>
</div>

<script>
// ─── Setup ────────────────────────────────────────────────────────────────────

const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d');
const input    = document.getElementById('word-input');
const scoreEl  = document.getElementById('score');
const livesEl  = document.getElementById('lives');
const overlay  = document.getElementById('overlay');
const oTitle   = document.getElementById('overlay-title');
const oSub     = document.getElementById('overlay-sub');
const oBtn     = document.getElementById('overlay-btn');

let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

// ─── Word list (short, fun, varied) ──────────────────────────────────────────

const WORDS = [
  'sun','cat','joy','run','fly','hop','zip','wow','red','fog',
  'blue','fire','jump','star','wave','glow','spin','dash','haze','buzz',
  'spark','bloom','dream','light','cloud','swift','ocean','flame','frost',
  'bright','cosmic','rocket','bounce','wonder','ripple','breeze','violet',
  'thunder','rainbow','flutter','shimmer','twinkle','horizon','lantern',
  'asteroid','dynamite','firework','stardust','moonbeam','blizzard',
  'supernova','butterfly','adventure','wonderful','telescope'
];

const COLORS = [
  '#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff',
  '#5f27cd','#01a3a4','#f368e0','#ff6348','#7bed9f',
  '#ffa502','#2ed573','#1e90ff','#ff4757','#eccc68'
];

// ─── State ───────────────────────────────────────────────────────────────────

let fallingWords  = [];
let particles     = [];
let score         = 0;
let lives         = 3;
let active        = true;
let spawnTimer    = 0;
let spawnInterval = 2200;
let baseSpeed     = 0.55;
let lastTime      = 0;
let combo         = 0;

// ─── Spawning ────────────────────────────────────────────────────────────────

function pickWord() {
  const maxLen = Math.min(3 + Math.floor(score / 8), 11);
  const pool   = WORDS.filter(w => w.length <= maxLen);
  return pool[Math.floor(Math.random() * pool.length)];
}

function spawn() {
  const text  = pickWord();
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  fallingWords.push({
    text,
    x: 70 + Math.random() * (W - 140),
    y: -36,
    color,
    speed: baseSpeed + Math.random() * 0.25,
    size: 24 + Math.random() * 10,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpd: 0.4 + Math.random() * 1.2
  });
}

// ─── Particles ───────────────────────────────────────────────────────────────

function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(a) * v,
      vy: Math.sin(a) * v - 2,
      color,
      r: 3 + Math.random() * 5,
      life: 1,
      decay: 0.014 + Math.random() * 0.018
    });
  }
}

// ─── Game logic ──────────────────────────────────────────────────────────────

function tryMatch() {
  const typed = input.value.toLowerCase().trim();
  if (!typed) return;

  // find closest-to-bottom match
  let best = null, bestY = -1;
  for (const w of fallingWords) {
    if (w.text === typed && w.y > bestY) { best = w; bestY = w.y; }
  }
  if (!best) return;

  fallingWords.splice(fallingWords.indexOf(best), 1);
  combo++;
  const pts = best.text.length * (1 + Math.floor(combo / 5));
  score += pts;
  scoreEl.textContent = score;
  burst(best.x, best.y, best.color, 14 + combo * 2);
  input.value = '';

  // difficulty ramp
  if (score > 0 && score % 25 < pts) {
    spawnInterval = Math.max(550, spawnInterval - 80);
    baseSpeed     = Math.min(1.6, baseSpeed + 0.04);
  }
}

function loseLife() {
  lives--;
  combo = 0;
  renderLives();
  if (lives <= 0) endGame();
}

function renderLives() {
  livesEl.textContent = '\u2764\uFE0F'.repeat(Math.max(0, lives));
}

function endGame() {
  active = false;
  oTitle.textContent = 'Game Over';
  oSub.textContent   = 'Score: ' + score;
  overlay.style.display = 'flex';
  input.blur();
}

function restart() {
  fallingWords  = [];
  particles     = [];
  score         = 0;
  lives         = 3;
  combo         = 0;
  spawnTimer    = 0;
  spawnInterval = 2200;
  baseSpeed     = 0.55;
  active        = true;
  scoreEl.textContent = '0';
  renderLives();
  overlay.style.display = 'none';
  input.value = '';
  input.focus();
  lastTime = performance.now();
}

// ─── Render loop ─────────────────────────────────────────────────────────────

function loop(t) {
  const dt = Math.min(t - lastTime, 48);
  lastTime = t;

  // background gradient
  const g = ctx.createLinearGradient(0, 0, W * 0.4, H);
  g.addColorStop(0, '#667eea');
  g.addColorStop(1, '#764ba2');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  if (active) {
    spawnTimer += dt;
    if (spawnTimer >= spawnInterval) { spawnTimer = 0; spawn(); }

    // update words
    for (let i = fallingWords.length - 1; i >= 0; i--) {
      const w = fallingWords[i];
      w.y += w.speed * dt * 0.06;
      w.wobble += w.wobbleSpd * dt * 0.003;
      if (w.y > H - 110) { fallingWords.splice(i, 1); loseLife(); if (!active) break; }
    }
  }

  // update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.12;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // draw words
  const typed = input.value.toLowerCase();
  for (const w of fallingWords) {
    const xOff = Math.sin(w.wobble) * 10;
    ctx.font = `bold ${w.size}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillText(w.text, w.x + xOff + 2, w.y + 2);

    // base color
    ctx.fillStyle = w.color;
    ctx.fillText(w.text, w.x + xOff, w.y);

    // highlight typed prefix
    if (typed && w.text.startsWith(typed)) {
      const part  = w.text.slice(0, typed.length);
      const fullW = ctx.measureText(w.text).width;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(part, w.x + xOff - fullW / 2, w.y);
      ctx.textAlign = 'center';
    }
  }

  // draw particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // combo display
  if (combo >= 3 && active) {
    ctx.font = 'bold 16px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(255,255,255,${0.4 + Math.sin(t * 0.005) * 0.2})`;
    ctx.fillText(`${combo}x combo`, W / 2, H - 90);
  }

  requestAnimationFrame(loop);
}

// ─── Events ──────────────────────────────────────────────────────────────────

input.addEventListener('input', () => { if (active) tryMatch(); });
input.addEventListener('keydown', e => { if (e.key === 'Enter') tryMatch(); });
oBtn.addEventListener('click', restart);
addEventListener('click', () => { if (active) input.focus(); });

// ─── Go ──────────────────────────────────────────────────────────────────────

renderLives();
input.focus();
lastTime = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
