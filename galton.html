<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galton Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #07070f; overflow: hidden; height: 100vh; font-family: Georgia, serif; }
  canvas { position: fixed; top: 0; left: 0; display: block; }

  #header {
    position: fixed; top: 22px; left: 0; right: 0;
    text-align: center; pointer-events: none; z-index: 10;
  }
  #title {
    font-size: 17px; font-weight: normal;
    letter-spacing: .14em; color: rgba(255,255,255,.36);
  }
  #subtitle {
    font-size: 11px; color: rgba(255,255,255,.15);
    margin-top: 5px; letter-spacing: .06em;
  }

  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    background: rgba(7,7,18,.9); border: 1px solid rgba(255,255,255,.07);
    border-radius: 13px; padding: 9px 16px;
    backdrop-filter: blur(10px); z-index: 10; white-space: nowrap;
  }
  button {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    color: rgba(255,255,255,.65); padding: 5px 12px; border-radius: 7px;
    cursor: pointer; font-family: inherit; font-size: 12px; transition: all .15s;
  }
  button:hover { background: rgba(255,255,255,.13); color: rgba(255,255,255,.9); }
  .div { width: 1px; height: 18px; background: rgba(255,255,255,.08); flex-shrink: 0; }
  label {
    font-size: 11px; color: rgba(255,255,255,.35);
    display: flex; align-items: center; gap: 6px;
  }
  input[type=range] { width: 88px; accent-color: rgba(255,120,60,.85); cursor: pointer; }
  #pval { color: rgba(255,255,255,.55); min-width: 28px; font-size: 11px; }
  #ncount { font-size: 11px; color: rgba(255,255,255,.22); min-width: 65px; font-style: italic; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="header">
  <div id="title">Galton Board</div>
  <div id="subtitle">each ball chooses freely — none of them chose this</div>
</div>

<div id="controls">
  <button onclick="drop(1)">drop 1</button>
  <button onclick="drop(10)">drop 10</button>
  <button onclick="drop(100)">drop 100</button>
  <div class="div"></div>
  <label>
    p →
    <input type="range" id="prange" min="0" max="100" value="50"
           oninput="setProb(+this.value)">
    <span id="pval">50%</span>
  </label>
  <div class="div"></div>
  <button onclick="doReset()">reset</button>
  <span id="ncount">n = 0</span>
</div>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H;

const ROWS = 14;
let SP, ROWH, TOP, CX, HISTY, HISTH, PR, BR;

function lay() {
  W = cv.width = innerWidth;
  H = cv.height = innerHeight;
  SP     = Math.min(50, W * 0.72 / (ROWS + 1));
  ROWH   = Math.min(40, H * 0.52 / ROWS);
  TOP    = 86;
  CX     = W / 2;
  HISTY  = TOP + (ROWS + 0.5) * ROWH;
  HISTH  = H - HISTY - 78;
  PR     = Math.max(2.5, SP / 13);
  BR     = Math.max(4,   SP / 9.5);
}

let prob = 0.5;
let balls = [], counts = new Array(ROWS + 1).fill(0), total = 0;

function setProb(v) {
  prob = v / 100;
  document.getElementById('pval').textContent = v + '%';
}

function doReset() {
  balls = []; counts.fill(0); total = 0;
  document.getElementById('ncount').textContent = 'n = 0';
}

function pegXY(r, p) {
  return { x: CX + (p - r / 2) * SP, y: TOP + r * ROWH };
}
function binX(b) { return CX + (b - ROWS / 2) * SP; }

const COLORS = [
  '#ff6b6b','#ffa94d','#ffe066','#69db7c',
  '#4dabf7','#da77f2','#ff8787','#63e6be',
  '#74c0fc','#f783ac','#a9e34b','#66d9e8'
];
let ci = 0;

class Ball {
  constructor() {
    this.pts = [{ x: CX, y: TOP - ROWH * 1.3 }];
    let bin = 0;
    for (let r = 0; r < ROWS; r++) {
      const { x, y } = pegXY(r, bin);
      this.pts.push({ x, y });
      if (Math.random() < prob) bin++;
    }
    this.bin = bin;
    this.pts.push({ x: binX(bin), y: HISTY - 2 });
    this.t    = 0;
    this.spd  = 0.17 + Math.random() * 0.06;
    this.done = false;
    this.col  = COLORS[ci++ % COLORS.length];
  }

  update() {
    if (this.done) return;
    this.t += this.spd;
    if (this.t >= this.pts.length - 1) {
      this.t = this.pts.length - 1;
      this.done = true;
      counts[this.bin]++;
      total++;
      document.getElementById('ncount').textContent = 'n = ' + total;
    }
  }

  xy() {
    const i = Math.min(Math.floor(this.t), this.pts.length - 2);
    const f = this.t - i;
    const a = this.pts[i], b = this.pts[i + 1];
    return { x: a.x + (b.x - a.x) * f, y: a.y + (b.y - a.y) * f };
  }

  draw() {
    if (this.done) return;
    const { x, y } = this.xy();
    const g = ctx.createRadialGradient(x, y, 0, x, y, BR * 3);
    g.addColorStop(0, this.col + '55');
    g.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(x, y, BR * 3, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, BR, 0, Math.PI * 2);
    ctx.fillStyle = this.col; ctx.fill();
    ctx.beginPath(); ctx.arc(x - BR * .28, y - BR * .28, BR * .3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,.45)'; ctx.fill();
  }
}

function drop(n) {
  const delay = n === 1 ? 0 : n <= 20 ? 75 : 11;
  for (let i = 0; i < n; i++) setTimeout(() => balls.push(new Ball()), i * delay);
}

function binom(n, k) {
  if (k < 0 || k > n) return 0;
  let c = 1;
  for (let i = 0; i < k; i++) c = c * (n - i) / (i + 1);
  return c;
}
function pmf(k) { return binom(ROWS, k) * Math.pow(prob, k) * Math.pow(1 - prob, ROWS - k); }

function frame() {
  ctx.fillStyle = '#07070f';
  ctx.fillRect(0, 0, W, H);

  // Ambient glow
  const ag = ctx.createRadialGradient(CX, H * .36, 0, CX, H * .36, Math.max(W, H) * .55);
  ag.addColorStop(0, 'rgba(25,15,55,.42)');
  ag.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ag; ctx.fillRect(0, 0, W, H);

  // Pegs
  for (let r = 0; r < ROWS; r++) {
    for (let p = 0; p <= r; p++) {
      const { x, y } = pegXY(r, p);
      ctx.beginPath(); ctx.arc(x, y, PR * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(160,180,255,.05)'; ctx.fill();
      ctx.beginPath(); ctx.arc(x, y, PR, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(180,200,255,.42)'; ctx.fill();
    }
  }

  // Bin dividers
  ctx.strokeStyle = 'rgba(255,255,255,.045)';
  ctx.lineWidth = 1;
  for (let b = -1; b <= ROWS; b++) {
    const x = binX(b + 0.5);
    ctx.beginPath(); ctx.moveTo(x, HISTY); ctx.lineTo(x, HISTY + HISTH + 10); ctx.stroke();
  }

  // Baseline
  ctx.strokeStyle = 'rgba(255,255,255,.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(binX(-0.5), HISTY + HISTH);
  ctx.lineTo(binX(ROWS + 0.5), HISTY + HISTH);
  ctx.stroke();

  // Histogram bars + expected curve
  if (total > 0) {
    const maxP = Math.max(...counts.map(c => c / total));

    for (let b = 0; b <= ROWS; b++) {
      if (!counts[b]) continue;
      const bh = (counts[b] / total / maxP) * HISTH;
      const x = binX(b), bw = SP * 0.8;
      ctx.fillStyle = 'rgba(255,130,60,.25)';
      ctx.fillRect(x - bw / 2, HISTY + HISTH - bh, bw, bh);
      ctx.strokeStyle = 'rgba(255,130,60,.62)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x - bw / 2, HISTY + HISTH - bh, bw, bh);
    }

    // Expected PMF (dashed, normalized separately)
    const maxPMF = Math.max(...Array.from({ length: ROWS + 1 }, (_, k) => pmf(k)));
    ctx.beginPath();
    for (let b = 0; b <= ROWS; b++) {
      const eh = (pmf(b) / maxPMF) * HISTH;
      const x = binX(b), y = HISTY + HISTH - eh;
      b === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,.2)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Balls
  for (const ball of balls) { ball.update(); ball.draw(); }
  for (let i = balls.length - 1; i >= 0; i--) {
    if (balls[i].done) balls.splice(i, 1);
  }

  requestAnimationFrame(frame);
}

// Click anywhere above histogram to drop
cv.addEventListener('click', e => {
  if (e.clientY < HISTY) drop(1);
});

window.addEventListener('resize', lay);
lay();
frame();
</script>
</body>
</html>
