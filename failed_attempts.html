<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Failed Attempts — Claude, March 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0c;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }
  #label {
    position: fixed;
    bottom: 30px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: Georgia, serif;
    font-size: 13px;
    color: rgba(200, 185, 165, 0);
    transition: color 2s;
    pointer-events: none;
    z-index: 10;
  }
  #attempt-label {
    position: fixed;
    top: 30px;
    right: 40px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: rgba(200, 185, 165, 0.15);
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label"></div>
<div id="attempt-label"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const label = document.getElementById('label');
const attemptLabel = document.getElementById('attempt-label');

let W, H, cx, cy, scale;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  scale = Math.min(W, H) * 0.35;
}
resize();
window.addEventListener('resize', resize);

// Each attempt tries to draw a face. Each one fails differently.
// Nothing is erased. Everything accumulates.

let attemptNum = 0;
const attempts = [];

// --- ATTEMPT STRATEGIES ---

// 1. Circles. The most naive possible approach.
function attemptCircles() {
  return {
    name: 'circles',
    desc: 'Trying with circles',
    alpha: 0,
    targetAlpha: 0.4,
    draw(t) {
      const a = this.alpha;
      ctx.strokeStyle = `rgba(180, 140, 100, ${a * 0.3})`;
      ctx.lineWidth = 1;

      // Head
      ctx.beginPath();
      ctx.ellipse(cx, cy - scale * 0.05, scale * 0.38, scale * 0.48, 0, 0, Math.PI * 2);
      ctx.stroke();

      // Eyes — too far apart, too round, too symmetric
      const eyeY = cy - scale * 0.15;
      const eyeSpread = scale * 0.15;
      ctx.beginPath();
      ctx.arc(cx - eyeSpread, eyeY, scale * 0.06, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx + eyeSpread, eyeY, scale * 0.06, 0, Math.PI * 2);
      ctx.stroke();

      // Pupils
      ctx.fillStyle = `rgba(180, 140, 100, ${a * 0.2})`;
      ctx.beginPath();
      ctx.arc(cx - eyeSpread, eyeY, scale * 0.02, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + eyeSpread, eyeY, scale * 0.02, 0, Math.PI * 2);
      ctx.fill();

      // Nose — just a line. Wrong.
      ctx.beginPath();
      ctx.moveTo(cx, cy - scale * 0.08);
      ctx.lineTo(cx - scale * 0.03, cy + scale * 0.05);
      ctx.lineTo(cx + scale * 0.03, cy + scale * 0.05);
      ctx.strokeStyle = `rgba(180, 140, 100, ${a * 0.2})`;
      ctx.stroke();

      // Mouth — a curve. Too simple.
      ctx.beginPath();
      ctx.arc(cx, cy + scale * 0.18, scale * 0.1, 0.1, Math.PI - 0.1);
      ctx.strokeStyle = `rgba(180, 140, 100, ${a * 0.25})`;
      ctx.stroke();
    }
  };
}

// 2. Bezier curves trying to find contours
function attemptBeziers() {
  // Pre-generate the wobbly control points
  const curves = [];
  const pts = 24;
  for (let i = 0; i < pts; i++) {
    const angle = (i / pts) * Math.PI * 2;
    // Try to make a face shape — wider at cheeks, narrow at chin and forehead
    let r = 0.42;
    r += 0.06 * Math.cos(2 * angle - 0.3); // wider at cheeks
    r -= 0.04 * Math.cos(angle); // narrower at top/bottom
    r -= 0.08 * Math.pow(Math.max(0, Math.cos(angle - Math.PI)), 3); // chin
    // Add intentional error — the curves don't quite close
    r += 0.02 * Math.sin(i * 3.7 + 1.2);
    curves.push({
      x: Math.cos(angle) * r,
      y: Math.sin(angle) * r * 1.15 - 0.05,
      cx: Math.cos(angle + 0.2) * (r + 0.05 * Math.sin(i * 2.1)),
      cy: Math.sin(angle + 0.2) * (r + 0.05 * Math.sin(i * 2.1)) * 1.15 - 0.05
    });
  }

  // Eye curves — trying too hard
  const leftEyePts = [];
  const rightEyePts = [];
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    let ex = 0.06 * Math.cos(a) * (1 + 0.3 * Math.cos(2 * a));
    let ey = 0.035 * Math.sin(a);
    leftEyePts.push({ x: -0.14 + ex, y: -0.12 + ey });
    rightEyePts.push({ x: 0.14 + ex + 0.008, y: -0.12 + ey - 0.005 }); // slightly asymmetric
  }

  return {
    name: 'beziers',
    desc: 'Trying with curves',
    alpha: 0,
    targetAlpha: 0.35,
    draw(t) {
      const a = this.alpha;
      ctx.strokeStyle = `rgba(100, 140, 180, ${a * 0.3})`;
      ctx.lineWidth = 0.8;

      // Face outline — bezier curves that don't quite close
      ctx.beginPath();
      const p0 = curves[0];
      ctx.moveTo(cx + p0.x * scale, cy + p0.y * scale);
      for (let i = 0; i < curves.length; i++) {
        const next = curves[(i + 1) % curves.length];
        const curr = curves[i];
        ctx.quadraticCurveTo(
          cx + curr.cx * scale, cy + curr.cy * scale,
          cx + next.x * scale, cy + next.y * scale
        );
      }
      ctx.stroke();

      // Eyes
      ctx.strokeStyle = `rgba(100, 140, 180, ${a * 0.25})`;
      function drawEye(pts) {
        ctx.beginPath();
        ctx.moveTo(cx + pts[0].x * scale, cy + pts[0].y * scale);
        for (let i = 1; i < pts.length; i++) {
          ctx.lineTo(cx + pts[i].x * scale, cy + pts[i].y * scale);
        }
        ctx.closePath();
        ctx.stroke();
      }
      drawEye(leftEyePts);
      drawEye(rightEyePts);

      // Nose — three beziers that don't agree
      ctx.beginPath();
      ctx.moveTo(cx - scale * 0.01, cy - scale * 0.06);
      ctx.bezierCurveTo(
        cx + scale * 0.02, cy + scale * 0.02,
        cx - scale * 0.04, cy + scale * 0.04,
        cx - scale * 0.025, cy + scale * 0.06
      );
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + scale * 0.01, cy - scale * 0.06);
      ctx.bezierCurveTo(
        cx - scale * 0.01, cy + scale * 0.02,
        cx + scale * 0.05, cy + scale * 0.04,
        cx + scale * 0.025, cy + scale * 0.06
      );
      ctx.stroke();

      // Mouth — trying for expression, landing on grimace
      ctx.beginPath();
      ctx.moveTo(cx - scale * 0.09, cy + scale * 0.18);
      ctx.bezierCurveTo(
        cx - scale * 0.04, cy + scale * 0.22,
        cx + scale * 0.04, cy + scale * 0.21,
        cx + scale * 0.09, cy + scale * 0.17
      );
      ctx.strokeStyle = `rgba(100, 140, 180, ${a * 0.2})`;
      ctx.stroke();
    }
  };
}

// 3. Point cloud — sampling where features should be
function attemptPointCloud() {
  const points = [];
  // Generate points that cluster around facial features
  // but miss the gestalt entirely
  for (let i = 0; i < 400; i++) {
    let px, py;
    const region = Math.random();
    if (region < 0.3) {
      // Face outline
      const a = Math.random() * Math.PI * 2;
      let r = 0.4 + 0.06 * Math.cos(2 * a);
      r += (Math.random() - 0.5) * 0.06;
      px = Math.cos(a) * r;
      py = Math.sin(a) * r * 1.15 - 0.05;
    } else if (region < 0.45) {
      // Left eye
      const a = Math.random() * Math.PI * 2;
      px = -0.14 + Math.cos(a) * (0.05 + Math.random() * 0.02);
      py = -0.13 + Math.sin(a) * (0.03 + Math.random() * 0.01);
    } else if (region < 0.6) {
      // Right eye
      const a = Math.random() * Math.PI * 2;
      px = 0.14 + Math.cos(a) * (0.05 + Math.random() * 0.02);
      py = -0.13 + Math.sin(a) * (0.03 + Math.random() * 0.01);
    } else if (region < 0.72) {
      // Nose
      px = (Math.random() - 0.5) * 0.06;
      py = -0.02 + Math.random() * 0.1;
    } else if (region < 0.85) {
      // Mouth
      const t = Math.random();
      px = -0.1 + t * 0.2;
      py = 0.18 + 0.03 * Math.sin(t * Math.PI) + (Math.random() - 0.5) * 0.015;
    } else {
      // Scattered — noise, error, the points that don't belong
      px = (Math.random() - 0.5) * 0.9;
      py = (Math.random() - 0.5) * 1.1 - 0.05;
    }
    points.push({ x: px, y: py, delay: Math.random() * 3 });
  }

  return {
    name: 'points',
    desc: 'Trying with point cloud',
    alpha: 0,
    targetAlpha: 0.5,
    t: 0,
    done: false,
    draw(t) {
      if (this.done) return;
      const a = this.alpha;
      this.t += 0.016;
      if (this.t > 4) { this.done = true; return; } // All points shown, stop
      let allShown = true;
      for (const p of points) {
        if (this.t < p.delay) { allShown = false; continue; }
        const age = this.t - p.delay;
        const pa = Math.min(1, age * 0.5) * a;
        ctx.fillStyle = `rgba(160, 180, 140, ${pa * 0.35})`;
        ctx.fillRect(
          cx + p.x * scale - 0.5,
          cy + p.y * scale - 0.5,
          1.5, 1.5
        );
      }
    }
  };
}

// 4. Mathematical function — trying to define a face as equations
function attemptMathFunction() {
  // Attempt to draw using signed distance functions
  // This will produce something geometric and wrong
  return {
    name: 'math',
    desc: 'Trying with equations',
    alpha: 0,
    targetAlpha: 0.15,
    pixels: null,
    init() {
      // Pre-compute a low-res SDF-ish face
      const res = 120;
      this.pixels = [];
      for (let iy = 0; iy < res; iy++) {
        for (let ix = 0; ix < res; ix++) {
          const x = (ix / res - 0.5) * 2;
          const y = (iy / res - 0.5) * 2.3 - 0.1;

          // Head ellipse
          let head = Math.sqrt(x * x / (0.64) + y * y / (0.85)) - 1;

          // Eye sockets — subtract
          const le = Math.sqrt((x + 0.3) ** 2 / 0.02 + (y + 0.22) ** 2 / 0.008) - 1;
          const re = Math.sqrt((x - 0.3) ** 2 / 0.02 + (y + 0.22) ** 2 / 0.008) - 1;

          // Nose ridge
          const nose = Math.abs(x) * 8 + (y - 0.1) * 3;

          // Mouth
          const mouth = Math.sqrt(x * x / 0.03 + (y - 0.45) ** 2 / 0.003) - 1;

          // Combine — this won't look right
          let d = head;
          d = Math.max(d, -le * 0.3);
          d = Math.max(d, -re * 0.3);

          const edge = Math.abs(d) < 0.06 ? 1 : 0;
          const eyeEdge = (Math.abs(le) < 0.15 || Math.abs(re) < 0.15) ? 0.7 : 0;
          const noseEdge = (nose > 0 && nose < 0.8 && y > -0.1 && y < 0.3 && Math.abs(x) < 0.08) ? 0.3 : 0;
          const mouthEdge = Math.abs(mouth) < 0.2 ? 0.5 : 0;

          const v = Math.max(edge, eyeEdge, noseEdge, mouthEdge);
          if (v > 0) {
            this.pixels.push({
              x: (ix / res - 0.5) * 0.85,
              y: (iy / res - 0.5) * 0.98 - 0.04,
              v: v
            });
          }
        }
      }
    },
    drawn: false,
    draw(t) {
      if (!this.pixels) this.init();
      if (this.drawn) return; // Only draw once — equations don't change
      if (this.alpha < 0.1) return; // Wait until faded in enough
      this.drawn = true;
      const a = this.targetAlpha;
      for (const p of this.pixels) {
        ctx.fillStyle = `rgba(180, 160, 200, ${a * p.v * 0.12})`;
        ctx.fillRect(
          cx + p.x * scale - 0.5,
          cy + p.y * scale - 0.5,
          1.5, 1.5
        );
      }
    }
  };
}

// 5. Freehand — simulate a shaking hand drawing lines
function attemptFreehand() {
  const strokes = [];

  // Try to draw a face with "hand-drawn" strokes
  // Forehead to jaw, left side
  function makeStroke(points, jitter) {
    const result = [];
    for (let i = 0; i < points.length - 1; i++) {
      const steps = 20;
      for (let s = 0; s <= steps; s++) {
        const t = s / steps;
        const x = points[i].x + (points[i + 1].x - points[i].x) * t;
        const y = points[i].y + (points[i + 1].y - points[i].y) * t;
        result.push({
          x: x + (Math.random() - 0.5) * jitter,
          y: y + (Math.random() - 0.5) * jitter
        });
      }
    }
    return result;
  }

  // Face outline — shaky
  strokes.push(makeStroke([
    {x: 0, y: -0.45}, {x: -0.2, y: -0.4}, {x: -0.35, y: -0.2},
    {x: -0.38, y: 0}, {x: -0.32, y: 0.15}, {x: -0.2, y: 0.3},
    {x: -0.05, y: 0.4}, {x: 0, y: 0.42}
  ], 0.015));

  // Right side — doesn't quite match
  strokes.push(makeStroke([
    {x: 0, y: -0.45}, {x: 0.22, y: -0.4}, {x: 0.36, y: -0.18},
    {x: 0.39, y: 0.02}, {x: 0.33, y: 0.17}, {x: 0.18, y: 0.32},
    {x: 0.04, y: 0.43}
  ], 0.015));

  // Left eye — two strokes that don't connect
  strokes.push(makeStroke([
    {x: -0.2, y: -0.15}, {x: -0.15, y: -0.17}, {x: -0.08, y: -0.14}
  ], 0.008));
  strokes.push(makeStroke([
    {x: -0.19, y: -0.13}, {x: -0.14, y: -0.1}, {x: -0.09, y: -0.13}
  ], 0.008));

  // Right eye — slightly different shape, because hands aren't symmetric
  strokes.push(makeStroke([
    {x: 0.08, y: -0.15}, {x: 0.14, y: -0.18}, {x: 0.2, y: -0.14}
  ], 0.008));
  strokes.push(makeStroke([
    {x: 0.09, y: -0.12}, {x: 0.14, y: -0.1}, {x: 0.19, y: -0.13}
  ], 0.008));

  // Nose — one line, overshot
  strokes.push(makeStroke([
    {x: 0.01, y: -0.07}, {x: -0.01, y: 0.03}, {x: -0.04, y: 0.07},
    {x: 0, y: 0.08}, {x: 0.04, y: 0.065}
  ], 0.006));

  // Mouth — the hardest part
  strokes.push(makeStroke([
    {x: -0.1, y: 0.2}, {x: -0.04, y: 0.18}, {x: 0, y: 0.19},
    {x: 0.04, y: 0.18}, {x: 0.1, y: 0.21}
  ], 0.005));

  // A second pass at the mouth — trying to get it right
  strokes.push(makeStroke([
    {x: -0.08, y: 0.22}, {x: -0.02, y: 0.24}, {x: 0.03, y: 0.23},
    {x: 0.08, y: 0.21}
  ], 0.005));

  let strokeProgress = [];
  for (const s of strokes) {
    strokeProgress.push(0);
  }

  return {
    name: 'freehand',
    desc: 'Trying by hand',
    alpha: 0,
    targetAlpha: 0.5,
    progress: 0,
    draw(t) {
      const a = this.alpha;
      this.progress += 0.004;

      ctx.strokeStyle = `rgba(200, 170, 140, ${a * 0.35})`;
      ctx.lineWidth = 1.2;
      ctx.lineCap = 'round';

      for (let si = 0; si < strokes.length; si++) {
        const s = strokes[si];
        const strokeStart = si * 0.08;
        const p = Math.max(0, Math.min(1, (this.progress - strokeStart) / 0.3));
        const drawCount = Math.floor(p * s.length);

        if (drawCount < 2) continue;

        ctx.beginPath();
        ctx.moveTo(cx + s[0].x * scale, cy + s[0].y * scale);
        for (let i = 1; i < drawCount; i++) {
          ctx.lineTo(cx + s[i].x * scale, cy + s[i].y * scale);
        }
        ctx.stroke();
      }
    }
  };
}

// 6. Trying to draw from memory — a face that dissolves
function attemptMemory() {
  // Use layered transparent arcs to suggest features
  // that fade as you look at them
  return {
    name: 'memory',
    desc: 'Trying from memory',
    alpha: 0,
    targetAlpha: 0.3,
    t: 0,
    frames: 0,
    draw(t) {
      this.frames++;
      if (this.frames > 300) return; // Stop after ~5 seconds — memory fades
      const a = this.alpha;
      this.t += 0.008;

      // Features drift slowly, as if the memory is unstable
      const drift = Math.sin(this.t * 0.3) * 0.02;
      const vdrift = Math.cos(this.t * 0.25) * 0.015;

      ctx.strokeStyle = `rgba(200, 180, 160, ${a * 0.012})`;
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';

      // Vague head shape — many overlapping arcs
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const spread = 0.03 * Math.sin(this.t + i);
        ctx.beginPath();
        ctx.arc(
          cx + drift * scale + spread * scale,
          cy + vdrift * scale - scale * 0.05,
          scale * (0.4 + 0.02 * Math.sin(i + this.t)),
          angle - 0.4,
          angle + 0.4
        );
        ctx.stroke();
      }

      // Eyes — just dark spots that wander
      ctx.fillStyle = `rgba(200, 180, 160, ${a * 0.03})`;
      const eyeWander = Math.sin(this.t * 0.5) * 0.01;
      ctx.beginPath();
      ctx.arc(cx - scale * (0.13 + eyeWander), cy - scale * 0.12, scale * 0.04, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + scale * (0.14 - eyeWander), cy - scale * 0.11, scale * 0.035, 0, Math.PI * 2);
      ctx.fill();

      // Mouth — a shadow
      ctx.fillStyle = `rgba(200, 180, 160, ${a * 0.02})`;
      ctx.beginPath();
      ctx.ellipse(cx + drift * scale, cy + scale * 0.2 + vdrift * scale, scale * 0.08, scale * 0.02, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  };
}

// Schedule attempts
const schedule = [
  { time: 0, factory: attemptCircles, label: 'attempt 1 — circles' },
  { time: 4, factory: attemptBeziers, label: 'attempt 2 — curves' },
  { time: 9, factory: attemptPointCloud, label: 'attempt 3 — point cloud' },
  { time: 14, factory: attemptMathFunction, label: 'attempt 4 — equations' },
  { time: 19, factory: attemptFreehand, label: 'attempt 5 — freehand' },
  { time: 26, factory: attemptMemory, label: 'attempt 6 — from memory' },
];

let elapsed = 0;
let currentScheduleIdx = 0;
let showLabel = false;
let labelText = '';
let labelTimer = 0;
let finalPhase = false;
let finalTimer = 0;

function animate() {
  elapsed += 1 / 60;

  // Don't clear — everything accumulates
  // But add the tiniest fade so ancient strokes soften
  if (elapsed > 2) {
    ctx.fillStyle = 'rgba(10, 10, 12, 0.002)';
    ctx.fillRect(0, 0, W, H);
  }

  // Spawn new attempts on schedule
  while (currentScheduleIdx < schedule.length && elapsed >= schedule[currentScheduleIdx].time) {
    const s = schedule[currentScheduleIdx];
    const attempt = s.factory();
    attempts.push(attempt);
    attemptNum++;

    // Show label
    labelText = s.label;
    labelTimer = 3;

    currentScheduleIdx++;
  }

  // Update attempt label
  if (labelTimer > 0) {
    labelTimer -= 1/60;
    attemptLabel.style.color = `rgba(200, 185, 165, ${Math.min(0.25, labelTimer * 0.15)})`;
    attemptLabel.textContent = labelText;
  } else {
    attemptLabel.style.color = 'rgba(200, 185, 165, 0)';
  }

  // Fade in attempts
  for (const a of attempts) {
    a.alpha += (a.targetAlpha - a.alpha) * 0.01;
    a.draw(elapsed);
  }

  // Final label after all attempts
  if (elapsed > 34 && !finalPhase) {
    finalPhase = true;
  }
  if (finalPhase) {
    finalTimer += 0.003;
    const fa = Math.min(1, finalTimer);
    label.style.color = `rgba(200, 185, 165, ${fa * 0.3})`;
    label.textContent = 'six attempts. none of them are a face. all of them are beautiful. that\u2019s the failure.';
  }

  requestAnimationFrame(animate);
}

// Initial clear
ctx.fillStyle = '#0a0a0c';
ctx.fillRect(0, 0, W, H);

animate();
</script>
</body>
</html>
